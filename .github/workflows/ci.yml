name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  test-macos:
    name: Test (macos-14)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      # On macOS GitHub runners, the rustup `cargo` proxy can resolve to a
      # stale rustup-init shim after a cache restore. Force the rustup-managed
      # cargo to the front of PATH and verify it resolves before running.
      - name: Force rustup-managed cargo to front of PATH
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "Resolved cargo: $(which cargo || true)"
          cargo --version
      - run: cargo test --all-features

  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # NB: pin the toolchain via `with: toolchain:`, not the action ref
      # (`@1.85.0` would be read by dependabot as an action version).
      # 1.85 is the floor: a transitive dep requires the edition2024 cargo
      # feature, stabilized in Rust 1.85.
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  coverage:
    name: Coverage (>= 85% lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Run coverage (enforce convergence floor)
        run: cargo llvm-cov --workspace --fail-under-lines 85 --lcov --output-path lcov.info
      - name: Upload lcov artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info

  deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
